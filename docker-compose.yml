name: face-auth

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: face_auth
      POSTGRES_USER: face_auth
      POSTGRES_PASSWORD: face_auth_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face_auth -d face_auth"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://face_auth:face_auth_password@postgres:5432/face_auth
      UPLOAD_DIR: /app/uploads
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-this-password
      ADMIN_TOKEN_SECRET: change-this-secret
      CORS_ORIGINS: http://localhost,http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
